services:
  - type: web
    name: ufgenius-dashboard
    env: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.lock
    # --timeout 120: scan endpoint fetches 500+ tickers and takes 60-120s
    # --workers 1:   single worker prevents memory duplication on free tier
    # --threads 4:   handle concurrent API + UI requests within one worker
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 wsgi:app
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.2"
      # Required: enable remote access and trust Render's proxy headers
      - key: DASHBOARD_ALLOW_REMOTE
        value: "true"
      - key: DASHBOARD_TRUST_PROXY
        value: "true"
      # Auto-generated API key — copy from Render dashboard after first deploy
      - key: DASHBOARD_API_KEY
        generateValue: true
      # Use in-memory rate limiter (no disk persistence needed; resets on restart)
      - key: DASHBOARD_RATE_LIMIT_BACKEND
        value: "memory"

      # ── Optional: set these in the Render dashboard (mark as Secret) ──────
      # Market data / brokerage
      # - key: ALPACA_API_KEY
      #   sync: false
      # - key: ALPACA_SECRET_KEY
      #   sync: false
      # - key: ALPHA_VANTAGE_API_KEY
      #   sync: false
      # - key: FINNHUB_API_KEY
      #   sync: false
      # - key: NEWS_API_KEY
      #   sync: false
      # - key: FRED_API_KEY
      #   sync: false
      # - key: REDDIT_CLIENT_ID
      #   sync: false
      # - key: REDDIT_CLIENT_SECRET
      #   sync: false
      # Alerts
      # - key: TELEGRAM_BOT_TOKEN
      #   sync: false
      # - key: TELEGRAM_CHAT_ID
      #   sync: false
      # - key: EMAIL_FROM
      #   sync: false
      # - key: EMAIL_PASSWORD
      #   sync: false
      # - key: EMAIL_TO
      #   sync: false

  # ── Optional: persistent disk for market-data cache (paid plans only) ───
  #   Without this, the data/ cache is wiped on every deploy/restart.
  #   The app works without it — data is re-fetched from yfinance on demand.
  # disk:
  #   name: ufgenius-cache
  #   mountPath: /opt/render/project/src/data
  #   sizeGB: 1
